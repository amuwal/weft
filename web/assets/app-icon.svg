<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Linger app icon">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FAF6EE"/>
      <stop offset="55%" stop-color="#F4EFE3"/>
      <stop offset="100%" stop-color="#ECE5D3"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="32%" r="78%">
      <stop offset="0%"  stop-color="#FFFCF4" stop-opacity="1"/>
      <stop offset="60%" stop-color="#F4EFE3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%"  stop-color="#7AA284"/>
      <stop offset="50%" stop-color="#5C7A66"/>
      <stop offset="100%" stop-color="#3F5A48"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="36%" r="60%">
      <stop offset="0%"  stop-color="#A6BFAD"/>
      <stop offset="55%" stop-color="#5C7A66"/>
      <stop offset="100%" stop-color="#2F4A38"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- paper background -->
  <rect width="1024" height="1024" fill="url(#paper)"/>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!-- subtle paper grain -->
  <g opacity="0.06">
    <circle cx="180" cy="260" r="1.2" fill="#1B1A17"/>
    <circle cx="340" cy="180" r="1.2" fill="#1B1A17"/>
    <circle cx="780" cy="240" r="1.2" fill="#1B1A17"/>
    <circle cx="880" cy="420" r="1.2" fill="#1B1A17"/>
    <circle cx="220" cy="720" r="1.2" fill="#1B1A17"/>
    <circle cx="660" cy="820" r="1.2" fill="#1B1A17"/>
    <circle cx="500" cy="900" r="1.2" fill="#1B1A17"/>
  </g>

  <!-- the arc: a quiet low connecting curve -->
  <path d="M 252 600 Q 512 320 772 600"
        fill="none"
        stroke="url(#arc)"
        stroke-width="34"
        stroke-linecap="round"
        opacity="0.96"/>

  <!-- two dots -->
  <circle cx="252" cy="600" r="44" fill="url(#dot)"/>
  <circle cx="772" cy="600" r="44" fill="url(#dot)"/>

  <!-- inner highlight on dots -->
  <circle cx="240" cy="586" r="14" fill="#FFFFFF" opacity="0.55" filter="url(#soft)"/>
  <circle cx="760" cy="586" r="14" fill="#FFFFFF" opacity="0.55" filter="url(#soft)"/>

  <!-- whisper of underline -->
  <line x1="380" y1="700" x2="644" y2="700"
        stroke="#1B1A17" stroke-opacity="0.06" stroke-width="3" stroke-linecap="round"/>
</svg>
