      <stop offset="0%"  stop-color="#2A3A30"/>
      <stop offset="60%" stop-color="#1E2A22"/>
      <stop offset="100%" stop-color="#141B16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="70%">
