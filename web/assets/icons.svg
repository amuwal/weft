<!--
  SF Symbols-style icon sprite. Each icon is referenced with <svg><use href="assets/icons.svg#name"/></svg>
  Stroke weight 1.6, rounded caps, currentColor for color inheritance.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

  <!-- gear -->
  <symbol id="i-gear" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2.6v2.2M12 19.2v2.2M4.6 12H2.4M21.6 12h-2.2M5.4 5.4l1.6 1.6M17 17l1.6 1.6M5.4 18.6 7 17M17 7l1.6-1.6"/>
    </g>
  </symbol>

  <!-- search -->
  <symbol id="i-search" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="6.5"/>
      <path d="m20 20-4.3-4.3"/>
    </g>
  </symbol>

  <!-- plus -->
  <symbol id="i-plus" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
      <path d="M12 4.6v14.8M4.6 12h14.8"/>
    </g>
  </symbol>

  <!-- chevron-left -->
  <symbol id="i-chev-l" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" d="m14 6-6 6 6 6"/>
  </symbol>

  <!-- chevron-right -->
  <symbol id="i-chev-r" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" d="m10 6 6 6-6 6"/>
  </symbol>

  <!-- pencil -->
  <symbol id="i-pencil" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 20h4l10-10-4-4L4 16v4z"/>
      <path d="m14 6 4 4"/>
    </g>
  </symbol>

  <!-- check -->
  <symbol id="i-check" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="m5 12 4.5 4.5L19 7"/>
  </symbol>

  <!-- house (today/home) -->
  <symbol id="i-home" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3.5 11.4 12 4.4l8.5 7"/>
      <path d="M5.5 10.4V20h13V10.4"/>
      <path d="M10.2 20v-5h3.6v5"/>
    </g>
  </symbol>

  <!-- people -->
  <symbol id="i-people" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="3.4"/>
      <circle cx="17" cy="10.5" r="2.6"/>
      <path d="M3 19c.7-3 3-4.6 6-4.6S14.3 16 15 19"/>
      <path d="M14.5 14.5c.5-.2 1-.3 1.6-.3 2.5 0 4.2 1.4 4.9 4"/>
    </g>
  </symbol>

  <!-- calendar -->
  <symbol id="i-cal" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3.5" y="5" width="17" height="15.5" rx="3"/>
      <path d="M3.5 10h17M8 3.4v3.2M16 3.4v3.2"/>
    </g>
  </symbol>

  <!-- note (lined paper) -->
  <symbol id="i-note" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5.5 3.5h9l4.5 4.5v12.5h-13.5z"/>
      <path d="M14.5 3.5v4.5h4.5"/>
      <path d="M8 13h7.5M8 16.5h5"/>
    </g>
  </symbol>

  <!-- thread (link) -->
  <symbol id="i-thread" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 14a3.5 3.5 0 0 1 0-5l3-3a3.5 3.5 0 1 1 5 5l-1.5 1.5"/>
      <path d="M14 10a3.5 3.5 0 0 1 0 5l-3 3a3.5 3.5 0 1 1-5-5l1.5-1.5"/>
    </g>
  </symbol>

  <!-- snooze (moon) -->
  <symbol id="i-snooze" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="M21 13.2A8.5 8.5 0 1 1 10.8 3a7 7 0 0 0 10.2 10.2z"/>
  </symbol>

  <!-- watch -->
  <symbol id="i-watch" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="5" width="12" height="14" rx="3"/>
      <path d="M9 2.5h6l-.5 2.5h-5z"/>
      <path d="M9 21.5h6l-.5-2.5h-5z"/>
      <path d="M12 9.5v3l2 1.5"/>
    </g>
  </symbol>

  <!-- bell-soft -->
  <symbol id="i-bell" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 17c2-1.5 2-4 2-6a4 4 0 0 1 8 0c0 2 0 4.5 2 6z"/>
      <path d="M10.5 20a1.5 1.5 0 0 0 3 0"/>
    </g>
  </symbol>

  <!-- cloud -->
  <symbol id="i-cloud" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="M7 18a4 4 0 0 1-.6-7.94A6 6 0 0 1 18 11a3.5 3.5 0 0 1-1 7z"/>
  </symbol>

  <!-- text (theme) -->
  <symbol id="i-text" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6h16M4 12h10M4 18h16"/>
    </g>
  </symbol>

  <!-- paint drop (theme accent) -->
  <symbol id="i-drop" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="M12 3.6c2.5 3 6 7 6 10.4a6 6 0 1 1-12 0c0-3.4 3.5-7.4 6-10.4z"/>
  </symbol>

  <!-- export (square arrow) -->
  <symbol id="i-export" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3.4v12"/>
      <path d="m8 7.4 4-4 4 4"/>
      <path d="M5 13v6.6h14V13"/>
    </g>
  </symbol>

  <!-- trash -->
  <symbol id="i-trash" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6.5h16"/>
      <path d="M10 3.6h4M9 6.5l.7 13a1.6 1.6 0 0 0 1.6 1.5h1.4a1.6 1.6 0 0 0 1.6-1.5l.7-13"/>
      <path d="M10.5 10v7M13.5 10v7"/>
    </g>
  </symbol>

  <!-- camera (photo) -->
  <symbol id="i-camera" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3.5 8.5a2 2 0 0 1 2-2h2l1.5-2h6L16.5 6.5h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-13a2 2 0 0 1-2-2z"/>
      <circle cx="12" cy="13" r="3.5"/>
    </g>
  </symbol>

  <!-- pin -->
  <symbol id="i-pin" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 4 20 10l-3 1-2 5-5-5-5 2-1-1L8.5 8 5 6l1-1 5 2z"/>
      <path d="m10 14-5 6"/>
    </g>
  </symbol>

  <!-- heart-soft (NOT for relationship UI, only paywall/about) -->
  <symbol id="i-heart" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="M12 19.5s-6.5-4-8.4-8.2A4.6 4.6 0 0 1 12 6.7a4.6 4.6 0 0 1 8.4 4.6C18.5 15.5 12 19.5 12 19.5z"/>
  </symbol>

  <!-- arrow-r -->
  <symbol id="i-arrow-r" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14"/>
      <path d="m13 6 6 6-6 6"/>
    </g>
  </symbol>

  <!-- arrow-r-small (used in lists) -->
  <symbol id="i-chev-small" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="m10 7 5 5-5 5"/>
  </symbol>

  <!-- dot dot dot -->
  <symbol id="i-more" viewBox="0 0 24 24">
    <g fill="currentColor">
      <circle cx="6"  cy="12" r="1.5"/>
      <circle cx="12" cy="12" r="1.5"/>
      <circle cx="18" cy="12" r="1.5"/>
    </g>
  </symbol>

  <!-- sparkles-quiet (used only on paywall) -->
  <symbol id="i-sparkle" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3.4v3.4M12 17.2v3.4M3.4 12H6.8M17.2 12h3.4"/>
      <path d="M12 8.5l1.5 2 2 1.5-2 1.5-1.5 2-1.5-2-2-1.5 2-1.5z"/>
    </g>
  </symbol>

  <!-- cell signal -->
  <symbol id="i-cell" viewBox="0 0 24 24">
    <g fill="currentColor">
      <rect x="2"  y="14" width="3" height="5" rx="1"/>
      <rect x="7"  y="11" width="3" height="8" rx="1"/>
      <rect x="12" y="8"  width="3" height="11" rx="1"/>
      <rect x="17" y="5"  width="3" height="14" rx="1"/>
    </g>
  </symbol>

  <!-- wifi -->
  <symbol id="i-wifi" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
      <path d="M3 9c5-4 13-4 18 0"/>
      <path d="M6 12.5c3.5-2.8 8.5-2.8 12 0"/>
      <path d="M9 16c2-1.4 4-1.4 6 0"/>
      <circle cx="12" cy="19" r="1.2" fill="currentColor"/>
    </g>
  </symbol>

  <!-- restore -->
  <symbol id="i-restore" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12a8 8 0 1 0 2.4-5.7L4 9"/>
      <path d="M4 4v5h5"/>
    </g>
  </symbol>

</svg>
