<!--
  Shared <head> additions injected into every page.
  This file is NOT served — it's the source of truth for the meta block.
  Updates here get applied to all pages via the perl one-liner in tooling/sync-head.sh
  (see README in this directory).
-->

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
<link rel="shortcut icon" href="/assets/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />

<!-- Open Graph -->
<meta property="og:site_name" content="Weft" />
<meta property="og:url" content="https://getweft.xyz/" />
<meta property="og:image" content="https://getweft.xyz/assets/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Weft — A quiet place for the people who matter." />
<meta property="og:locale" content="en_US" />
<meta property="og:locale:alternate" content="ja_JP" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://getweft.xyz/assets/og-image.png" />
<meta name="twitter:image:alt" content="Weft — A quiet place for the people who matter." />

<!-- Search engine hints -->
<meta name="application-name" content="Weft" />
<meta name="apple-mobile-web-app-title" content="Weft" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="format-detection" content="telephone=no" />
<meta name="robots" content="index, follow" />
<meta name="googlebot" content="index, follow" />
<meta name="author" content="Weft" />
