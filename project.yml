name: Linger
options:
  bundleIdPrefix: com.amuwal.linger
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_INTERNAL_IMPORTS_BY_DEFAULT: YES
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO   # turn on once we're past the scaffolding phase

packages:
  Collections:
    url: https://github.com/apple/swift-collections
    from: 1.5.0
  AsyncAlgorithms:
    url: https://github.com/apple/swift-async-algorithms
    from: 1.1.3

targets:
  Linger:
    type: application
    platform: iOS
    sources:
      - Linger
    resources:
      - path: Linger/Resources
        optional: true
    dependencies:
      - package: Collections
        product: OrderedCollections
      - package: AsyncAlgorithms
        product: AsyncAlgorithms
    info:
      path: Linger/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: bg
        CFBundleURLTypes:
          - CFBundleURLName: com.amuwal.linger
            CFBundleURLSchemes: ["linger"]
        CFBundleDisplayName: Linger
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSUserActivityTypes: []
        UIAppFonts: []
        # CloudKit/iCloud usage prompt
        NSUbiquitousContainers:
          iCloud.com.amuwal.linger:
            NSUbiquitousContainerIsDocumentScopePublic: false
            NSUbiquitousContainerName: Linger
            NSUbiquitousContainerSupportedFolderLevels: None
    entitlements:
      path: Linger/Linger.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.amuwal.linger
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.amuwal.linger
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.amuwal.linger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amuwal.linger
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: sage
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: '"Linger/Resources/Preview Content"'
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
    scheme:
      testTargets:
        - LingerTests
        - LingerUITests
      gatherCoverageData: true

  LingerTests:
    type: bundle.unit-test
    platform: iOS
    sources: [LingerTests]
    dependencies:
      - target: Linger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amuwal.linger.tests
        GENERATE_INFOPLIST_FILE: YES

  LingerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [LingerUITests]
    dependencies:
      - target: Linger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amuwal.linger.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Linger
