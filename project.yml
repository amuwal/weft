name: Weft
options:
  bundleIdPrefix: com.amuwal.weft
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true
  knownRegions:
    - en
    - ja
    - Base

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_INTERNAL_IMPORTS_BY_DEFAULT: YES
    DEVELOPMENT_TEAM: "F8QCQF656D"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO   # turn on once we're past the scaffolding phase

packages:
  Collections:
    url: https://github.com/apple/swift-collections
    from: 1.5.0
  AsyncAlgorithms:
    url: https://github.com/apple/swift-async-algorithms
    from: 1.1.3

targets:
  Weft:
    type: application
    platform: iOS
    sources:
      - Weft
      - path: WeftWidget/TodayWidgetShared.swift
      - path: WeftWidget/MarkCaughtUpIntent.swift
    resources:
      - path: Weft/Resources
        optional: true
    dependencies:
      - package: Collections
        product: OrderedCollections
      - package: AsyncAlgorithms
        product: AsyncAlgorithms
      - target: WeftWidget
    info:
      path: Weft/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: bg
        CFBundleURLTypes:
          - CFBundleURLName: com.amuwal.weft
            CFBundleURLSchemes: ["weft"]
        CFBundleDisplayName: Weft
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - ja
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSUserActivityTypes: []
        UIAppFonts: []
        # CloudKit/iCloud usage prompt
        NSUbiquitousContainers:
          iCloud.com.amuwal.weft:
            NSUbiquitousContainerIsDocumentScopePublic: false
            NSUbiquitousContainerName: Weft
            NSUbiquitousContainerSupportedFolderLevels: None
    entitlements:
      path: Weft/Weft.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.amuwal.weft
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.amuwal.weft
        com.apple.security.application-groups:
          - group.com.amuwal.weft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amuwal.weft
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: sage
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: '"Weft/Resources/Preview Content"'
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
    scheme:
      testTargets:
        - WeftTests
        - WeftUITests
      gatherCoverageData: true
      storeKitConfiguration: Weft/Weft.storekit

  WeftWidget:
    type: app-extension
    platform: iOS
    sources:
      - WeftWidget
      - path: Weft/Model/Person.swift
      - path: Weft/Model/Note.swift
      - path: Weft/Model/Thread.swift
      - path: Weft/Model/Touchpoint.swift
      - path: Weft/Model/ModelContainer+Weft.swift
      - path: Weft/Model/SampleData.swift
      - path: Weft/Services/ScoringService.swift
      - path: Weft/Services/Entitlements.swift
      - path: Weft/Services/Localization.swift
      - path: Weft/Services/PhotoCompressor.swift
    info:
      path: WeftWidget/Info.plist
      properties:
        CFBundleDisplayName: Weft
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    resources:
      - path: WeftWidget/PrivacyInfo.xcprivacy
    entitlements:
      path: WeftWidget/WeftWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.amuwal.weft
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.amuwal.weft
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.amuwal.weft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amuwal.weft.widget
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        SWIFT_EMIT_LOC_STRINGS: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: WIDGET_EXTENSION

  WeftTests:
    type: bundle.unit-test
    platform: iOS
    sources: [WeftTests]
    dependencies:
      - target: Weft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amuwal.weft.tests
        GENERATE_INFOPLIST_FILE: YES

  WeftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [WeftUITests]
    dependencies:
      - target: Weft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amuwal.weft.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Weft
